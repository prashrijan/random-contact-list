<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Contact List</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div
      class="wrapper min-vh-100 w-100 d-flex align-items-center justify-content-center"
    >
      <div
        class="phone-container bg-dark rounded-5 shadow-lg border border-black border-5 overflow-hidden"
      >
        <!-- Navbar -->
        <nav
          class="notification-bar text-light d-flex justify-content-between align-items-center px-3 py-2"
        >
          <div class="time">
            <h4>11:11</h4>
          </div>
          <div class="notch rounded-5"></div>
          <div class="icons fs-6">
            <i class="bi bi-reception-4"></i>
            <i class="bi bi-wifi"></i>
            <i class="bi bi-battery-half"></i>
          </div>
        </nav>

        <!-- Lock Screen -->
        <main class="screen position-relative h-100" id="lockScreen">
          <div
            class="slider-container d-flex p-3 rounded-5 m-3 position-relative"
          >
            <input type="range" min="0" max="100" value="0" class="slider" />
            <label class="slider-label text-dark position-absolute"
              >Slide to Unlock</label
            >
          </div>
        </main>

        <!-- App Screen -->
        <main
          class="screen d-none h-100 justify-content-center p-5 bg-dark"
          id="appScreen"
        >
          <div class="app-container text-center">
            <i class="bi bi-person-circle fs-1 logo p-2 rounded shadow"></i>
            <p class="mt-2 fw-bold text-light">Contacts</p>
          </div>
        </main>
        <main
          class="screen bg-dark d-flex flex-column row-gap-3 py-2 overflow-y-scroll"
          id="contactScreen"
        >
          <!-- header -->
          <header class="px-3">
            <h1 class="text-light fw-bold">Contacts</h1>
          </header>

          <!-- search form -->
          <div class="px-3">
            <div class="input-group bg-white rounded-5">
              <input
                type="text"
                class="form-control border-0 bg-transparent p-2 px-3"
                placeholder="Search Contact..."
                aria-describedby="basic-addon1"
                id="searchContainer"
              />
              <span
                class="input-group-text rounded-5 bg-white border-0"
                id="basic-addon1"
                ><i class="bi bi-search"></i
              ></span>
            </div>
          </div>
          <!-- spinner -->
          <div class="text-center" id="spinner">
            <div class="spinner-border text-primary text-center" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>

          <!-- contact list -->
          <div class="bg-light text-dark w-100" id="contact-list">
            <div class="p-3"><span id="userCount">0</span> Contacts</div>

            <!-- Accordion -->
            <div class="accordion" id="accordionExample"></div>
          </div>
        </main>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
